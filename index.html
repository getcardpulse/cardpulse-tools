<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>earlybird</title>
<meta name="description" content="earlybird — coming 2026">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ece4;
    --accent: #e8e0d4;
    --muted: #6b6560;
    --grain-opacity: 0.035;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Film grain overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: var(--grain-opacity);
    pointer-events: none;
    z-index: 1000;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    max-width: 600px;
    width: 100%;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .cover-wrapper {
    width: 100%;
    max-width: 480px;
    position: relative;
  }

  .cover-wrapper::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: linear-gradient(135deg, rgba(240,236,228,0.08), transparent 60%);
    z-index: 1;
    pointer-events: none;
  }

  .cover-img {
    width: 100%;
    display: block;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    filter: contrast(1.02) brightness(0.98);
  }

  .info {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  .description {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--accent);
    max-width: 380px;
    font-weight: 400;
    opacity: 0.85;
  }

  .links {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    margin-top: 0.5rem;
  }

  .links a {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    padding: 0.6rem 0;
    position: relative;
    transition: color 0.3s ease;
  }

  .links a::after {
    content: '';
    position: absolute;
    bottom: 0.4rem;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--fg);
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .links a:hover {
    color: var(--fg);
  }

  .links a:hover::after {
    width: 100%;
  }

  .separator {
    color: var(--muted);
    opacity: 0.3;
    font-size: 0.6rem;
    user-select: none;
  }

  /* Email signup */
  .signup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.5rem;
    width: 100%;
    max-width: 340px;
  }

  .signup-row {
    display: flex;
    width: 100%;
    gap: 0;
    border: 1px solid rgba(107, 101, 96, 0.3);
    transition: border-color 0.3s ease;
  }

  .signup-row:focus-within {
    border-color: rgba(107, 101, 96, 0.6);
  }

  .signup-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    letter-spacing: 0.02em;
  }

  .signup-row input::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  .signup-row button {
    background: transparent;
    border: none;
    border-left: 1px solid rgba(107, 101, 96, 0.3);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    transition: color 0.3s ease, background 0.3s ease;
    white-space: nowrap;
  }

  .signup-row button:hover {
    color: var(--fg);
    background: rgba(240, 236, 228, 0.04);
  }

  .signup-note {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  .signup-success {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 0;
    display: none;
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1.25rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fadeIn 1s 0.8s ease forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .footer-left, .footer-right {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.4;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .page {
      padding: 1.5rem;
      justify-content: flex-start;
      padding-top: 3rem;
    }

    .cover-wrapper {
      max-width: 100%;
    }

    .hero {
      gap: 2rem;
    }

    .footer {
      position: relative;
      margin-top: 3rem;
      padding: 1rem 0;
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="hero">
    <div class="cover-wrapper">
      <img src="website_image.png" alt="earlybird" class="cover-img">
    </div>

    <div class="info">
      <p class="tagline">New music coming 2026</p>

      <div class="signup" id="signupForm">
        <div class="signup-row">
          <input type="email" id="emailInput" placeholder="your email" autocomplete="email">
          <button onclick="handleSignup()">Notify me</button>
        </div>
        <p class="signup-note">We'll let you know when it drops. Nothing else.</p>
      </div>

      <p class="signup-success" id="signupSuccess">You're in. We'll be in touch.</p>

      <div class="links">
        <a href="https://open.spotify.com/artist/3127XYw3Zytqg17eXJX6UJ" target="_blank" rel="noopener">Spotify</a>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <span class="footer-left">&copy; 2026 earlybird</span>
  <span class="footer-right">earlybird.band</span>
</div>

<script>
  function handleSignup() {
    const email = document.getElementById('emailInput').value;
    if (email && email.includes('@')) {
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('signupSuccess').style.display = 'block';
    }
  }

  document.getElementById('emailInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSignup();
  });
</script>

</body>
</html>
